<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>特別鑑定書</title>

<style>
:root{
 --paper:#fbf6ea;
 --ink:#1c1a16;
 --muted:#6f665b;
 --accent:#3a2a6f;
 --gold:#c7a64b;
}

body{
 margin:0;
 font-family: "Hiragino Mincho ProN","Yu Mincho",serif;
 background:#0f0f14;
 padding:20px;
}

.sheet{
 max-width:820px;
 margin:auto;
 background:var(--paper);
 padding:30px;
 border-radius:18px;
 box-shadow:0 20px 60px rgba(0,0,0,.25);
}

h1{
 text-align:center;
 letter-spacing:.3em;
 margin-bottom:20px;
}

.section{
 margin-top:30px;
 line-height:1.9;
}

.aff-box{
 margin-top:30px;
 padding:20px;
 border:1px solid rgba(0,0,0,.1);
 border-radius:14px;
 background:rgba(255,255,255,.6);
}

.aff-title{
 font-size:18px;
 margin-bottom:10px;
}

.aff-desc{
 font-size:14px;
 color:var(--muted);
 line-height:1.8;
}

.aff-button{
 display:inline-block;
 margin-top:15px;
 padding:10px 18px;
 background:linear-gradient(135deg,var(--accent),#1f1745);
 color:#fff;
 border-radius:999px;
 text-decoration:none;
 font-size:14px;
}

.aff-button:hover{
 opacity:.85;
}

.note{
 margin-top:20px;
 font-size:12px;
 color:#888;
}

@media(max-width:600px){
 .sheet{padding:20px;}
}
</style>
</head>

<body>

<div class="sheet">

<h1>鑑 定 書</h1>

<div class="section">
<p>
今あなたに流れている運気は「整える」流れ。
焦らず、環境と心を整えることが開運の鍵になります。
</p>
</div>

<div class="section">
<h2>◆ ご神託の品</h2>

<div class="aff-box">
<div class="aff-title">浄化と波動を整えるブレスレット</div>

<div class="aff-desc">
今のあなたの運気には「浄化」が必要と出ています。
こちらは高波動天然石を使用し、心のノイズを静めるサポートをしてくれるアイテム。
夜のリセットタイムに特に効果的です。
</div>

<a href="ここにアフィリエイトリンクを入れる" 
   target="_blank" 
   rel="nofollow sponsored"
   class="aff-button">
詳細を見る
</a>

<div class="note">
※本ページはアフィリエイト広告を利用しています。
</div>

</div>
</div>

<div class="section">
<h2>◆ 最終メッセージ</h2>
<p>
あなたの未来は、静かに上昇しています。
焦らなくて大丈夫。
「整える」ことが、願いを現実に近づけます。
</p>
</div>

</div>

</body>
</html>
