<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>兆しの書院｜鑑定開始</title>

<style>
body{
margin:0;
font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
background: radial-gradient(circle at center,#2b2250,#0d0c14);
color:#fff;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.container{
padding:20px;
max-width:900px;
}

.hero-img{
width:90%;
max-width:700px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,215,0,.5);
margin-bottom:24px;
}

h1{
font-size:34px;
letter-spacing:8px;
margin:0 0 10px;
}

.subtitle{
opacity:0.85;
margin-bottom:36px;
}

.start-button{
display:inline-block;
padding:16px 36px;
background:linear-gradient(135deg,#3a2a6f,#c7a64b);
border-radius:40px;
color:#fff;
text-decoration:none;
font-size:18px;
letter-spacing:3px;
box-shadow:0 0 25px rgba(255,215,0,.5);
transition:0.3s;
}

.start-button:hover{
transform:scale(1.07);
box-shadow:0 0 35px rgba(255,215,0,.8);
}

footer{
margin-top:auto;
padding:20px;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<!-- ここが title.png 読み込み -->
<img src="title.png" alt="兆しの書院" class="hero-img">

<h1>兆しの書院</h1>
<p class="subtitle">月と星の導きによる特別鑑定</p>

<a href="https://lin.ee/nTbmE2A?openExternalBrowser=1"
   class="start-button"
   target="_blank">
   鑑定開始
</a>

</div>

<footer>
© 2026 kizashinoshoko
</footer>

</body>
</html>
